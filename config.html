<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watchface Config</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      padding: 18px;
    }
    h2 {
      margin-top: 0;
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }
    select,
    input {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      font-size: 16px;
      border: none;
      background: #fff;
      color: #000;
    }
  </style>
</head>
<body>
  <h2>Watchface Settings</h2>

  <label for="tl_metric">Top Left</label>
  <select id="tl_metric">
    <option value="0">Battery</option>
    <option value="1">Day</option>
    <option value="2">Bluetooth</option>
    <option value="3">Steps</option>
    <option value="4">Off</option>
  </select>

  <label for="tr_metric">Top Right</label>
  <select id="tr_metric">
    <option value="0">Battery</option>
    <option value="1">Day</option>
    <option value="2">Bluetooth</option>
    <option value="3">Steps</option>
    <option value="4">Off</option>
  </select>

  <label for="bl_metric">Bottom Left</label>
  <select id="bl_metric">
    <option value="0">Battery</option>
    <option value="1">Day</option>
    <option value="2">Bluetooth</option>
    <option value="3">Steps</option>
    <option value="4">Off</option>
  </select>

  <label for="br_metric">Bottom Right</label>
  <select id="br_metric">
    <option value="0">Battery</option>
    <option value="1">Day</option>
    <option value="2">Bluetooth</option>
    <option value="3">Steps</option>
    <option value="4">Off</option>
  </select>

  <label for="tl_color">Top Left Color</label>
  <input id="tl_color" type="color" value="#ff0000">

  <label for="tr_color">Top Right Color</label>
  <input id="tr_color" type="color" value="#0000ff">

  <label for="bl_color">Bottom Left Color</label>
  <input id="bl_color" type="color" value="#ffcc00">

  <label for="br_color">Bottom Right Color</label>
  <input id="br_color" type="color" value="#00ff00">

  <button onclick="save()">Save Settings</button>

  <script>
    function save() {
      var data = {
        tl_metric: parseInt(document.getElementById('tl_metric').value, 10),
        tr_metric: parseInt(document.getElementById('tr_metric').value, 10),
        bl_metric: parseInt(document.getElementById('bl_metric').value, 10),
        br_metric: parseInt(document.getElementById('br_metric').value, 10),
        tl_color: parseInt(document.getElementById('tl_color').value.substring(1), 16),
        tr_color: parseInt(document.getElementById('tr_color').value.substring(1), 16),
        bl_color: parseInt(document.getElementById('bl_color').value.substring(1), 16),
        br_color: parseInt(document.getElementById('br_color').value.substring(1), 16)
      };

      document.location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(data));
    }
  </script>
</body>
</html>
