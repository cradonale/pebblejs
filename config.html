<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watchface Config</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      padding: 18px;
    }

    h2 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    select, input, button {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      margin-top: 20px;
    }

    .hint {
      margin-top: 10px;
      color: #aaa;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h2>Watchface Settings</h2>

  <label>Time Format</label>
  <select id="use_24h">
    <option value="1">24 Hour</option>
    <option value="0">12 Hour</option>
  </select>

  <label id="tl_metric_label">Top Left</label>
  <select id="tl_metric">
    <option value="0">Battery</option>
    <option value="1">Day</option>
    <option value="2">Bluetooth</option>
    <option value="3">Steps</option>
    <option value="4">Off</option>
    <option value="5">Calendar Week</option>
    <option value="6">Calendar Day</option>
    <option value="7">Distance</option>
    <option value="8">Active Time</option>
    <option value="9" class="hr-option">Heart Rate</option>
  </select>

  <label id="tr_metric_label">Top Right</label>
  <select id="tr_metric">
    <option value="0">Battery</option>
    <option value="1">Day</option>
    <option value="2">Bluetooth</option>
    <option value="3">Steps</option>
    <option value="4">Off</option>
    <option value="5">Calendar Week</option>
    <option value="6">Calendar Day</option>
    <option value="7">Distance</option>
    <option value="8">Active Time</option>
    <option value="9" class="hr-option">Heart Rate</option>
  </select>

  <label id="bl_metric_label">Bottom Left</label>
  <select id="bl_metric">
    <option value="0">Battery</option>
    <option value="1">Day</option>
    <option value="2">Bluetooth</option>
    <option value="3">Steps</option>
    <option value="4">Off</option>
    <option value="5">Calendar Week</option>
    <option value="6">Calendar Day</option>
    <option value="7">Distance</option>
    <option value="8">Active Time</option>
    <option value="9" class="hr-option">Heart Rate</option>
  </select>

  <label id="br_metric_label">Bottom Right</label>
  <select id="br_metric">
    <option value="0">Battery</option>
    <option value="1">Day</option>
    <option value="2">Bluetooth</option>
    <option value="3">Steps</option>
    <option value="4">Off</option>
    <option value="5">Calendar Week</option>
    <option value="6">Calendar Day</option>
    <option value="7">Distance</option>
    <option value="8">Active Time</option>
    <option value="9" class="hr-option">Heart Rate</option>
  </select>

  <label id="tl_color_label">Top Left Color</label>
  <input id="tl_color" type="color" value="#ff0000">

  <label id="tr_color_label">Top Right Color</label>
  <input id="tr_color" type="color" value="#0000ff">

  <label id="bl_color_label">Bottom Left Color</label>
  <input id="bl_color" type="color" value="#ffcc00">

  <label id="br_color_label">Bottom Right Color</label>
  <input id="br_color" type="color" value="#00ff00">

  <div class="hint" id="layout_hint"></div>

  <button onclick="saveSettings()">Save Settings</button>

  <script>
    function getQueryParam(name) {
      var query = window.location.search.substring(1);
      var vars = query.split('&');

      for (var i = 0; i < vars.length; i++) {
        var pair = vars[i].split('=');
        if (decodeURIComponent(pair[0]) === name) {
          return decodeURIComponent(pair[1] || '');
        }
      }
      return null;
    }

    function toHexColor(value, fallback) {
      var n = parseInt(value, 10);
      if (isNaN(n)) {
        n = fallback;
      }
      var hex = n.toString(16);
      while (hex.length < 6) {
        hex = '0' + hex;
      }
      return '#' + hex;
    }

    function isGabbroLayout() {
      var platform = (getQueryParam('platform') || '').toLowerCase();
      return platform === 'gabbro';
    }

    function applyLayoutLabels() {
      if (isGabbroLayout()) {
        document.getElementById('tl_metric_label').textContent = 'Top';
        document.getElementById('tr_metric_label').textContent = 'Right';
        document.getElementById('bl_metric_label').textContent = 'Left';
        document.getElementById('br_metric_label').textContent = 'Bottom';

        document.getElementById('tl_color_label').textContent = 'Top Color';
        document.getElementById('tr_color_label').textContent = 'Right Color';
        document.getElementById('bl_color_label').textContent = 'Left Color';
        document.getElementById('br_color_label').textContent = 'Bottom Color';

        document.getElementById('layout_hint').textContent =
          'Round watch layout: Top, Right, Left, Bottom';
      }
    }

    function setInitialValues() {
      document.getElementById('use_24h').value = getQueryParam('use_24h') || '1';

      document.getElementById('tl_metric').value = getQueryParam('tl_metric') || '0';
      document.getElementById('tr_metric').value = getQueryParam('tr_metric') || '1';
      document.getElementById('bl_metric').value = getQueryParam('bl_metric') || '2';
      document.getElementById('br_metric').value = getQueryParam('br_metric') || '3';

      document.getElementById('tl_color').value = toHexColor(getQueryParam('tl_color'), 0xFF0000);
      document.getElementById('tr_color').value = toHexColor(getQueryParam('tr_color'), 0x0000FF);
      document.getElementById('bl_color').value = toHexColor(getQueryParam('bl_color'), 0xFFCC00);
      document.getElementById('br_color').value = toHexColor(getQueryParam('br_color'), 0x00FF00);
    }

    function disableHeartRateForGabbro() {
      if (!isGabbroLayout()) {
        return;
      }

      var hrOptions = document.querySelectorAll('.hr-option');
      for (var i = 0; i < hrOptions.length; i++) {
        hrOptions[i].style.display = 'none';
      }

      ['tl_metric', 'tr_metric', 'bl_metric', 'br_metric'].forEach(function(id) {
        var select = document.getElementById(id);
        if (select.value === '9') {
          select.value = '4';
        }
      });
    }

    function saveSettings() {
      var configData = {
        tl_metric: parseInt(document.getElementById('tl_metric').value, 10),
        tr_metric: parseInt(document.getElementById('tr_metric').value, 10),
        bl_metric: parseInt(document.getElementById('bl_metric').value, 10),
        br_metric: parseInt(document.getElementById('br_metric').value, 10),
        tl_color: parseInt(document.getElementById('tl_color').value.substring(1), 16),
        tr_color: parseInt(document.getElementById('tr_color').value.substring(1), 16),
        bl_color: parseInt(document.getElementById('bl_color').value.substring(1), 16),
        br_color: parseInt(document.getElementById('br_color').value.substring(1), 16),
        use_24h: parseInt(document.getElementById('use_24h').value, 10)
      };

      var returnTo = getQueryParam('return_to');

      if (returnTo) {
        document.location = returnTo + encodeURIComponent(JSON.stringify(configData));
      } else {
        alert('Missing return_to in CloudPebble');
      }
    }

    applyLayoutLabels();
    setInitialValues();
    disableHeartRateForGabbro();
  </script>
</body>
</html>
